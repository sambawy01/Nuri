<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nuri — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #FFF7ED, #FEF3C7, #EFF6FF);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 320px; }
    .owl { font-size: 80px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: #1F2937; margin-bottom: 0.5rem; font-weight: 800; }
    p { color: #6B7280; font-size: 0.9rem; font-weight: 600; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(135deg, #F97316, #A855F7);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="owl">🦉</div>
    <h1>Nuri is sleeping...</h1>
    <p>No internet connection right now. Connect to WiFi and try again!</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
